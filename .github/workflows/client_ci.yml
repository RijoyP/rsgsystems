name: Client CI

on:
  push:
    paths:
      - "client/**"
      - ".github/workflows/client_ci.yml"
      - "package.json"
      - "package-lock.json"
  pull_request:
    paths:
      - "client/**"
      - ".github/workflows/client_ci.yml"
      - "package.json"
      - "package-lock.json"

jobs:
  lint_client:
    name: Lint Client
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install client dependencies
        run: npm ci --prefix client

      - name: Install ESLint JUnit formatter
        run: npm install --no-save --prefix client eslint-formatter-junit

      - name: Ensure client lint-results directory exists
        run: mkdir -p client/lint-results

      - name: Run client lint and capture report
        id: client_lint
        continue-on-error: true
        run: |
          set +e
          npm run lint --prefix client -- --format junit --output-file client/lint-results/junit.xml > client/lint-results/lint.log 2>&1
          status=$?
          cat client/lint-results/lint.log
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish client lint results
        if: always() && hashFiles('client/lint-results/junit.xml') != ''
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: client/lint-results/junit.xml

      - name: Upload client lint artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: client-lint-results
          path: |
            client/lint-results/junit.xml
            client/lint-results/lint.log

      - name: Fail on client lint issues
        if: steps.client_lint.outputs.exit_code != '0'
        run: exit 1

  test_client:
    name: Test Client
    needs: [lint_client]
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install client dependencies
        run: npm ci --prefix client

      - name: Install JUnit reporter
        run: npm install --no-save --prefix client jest-junit

      - name: Ensure client test-results directory exists
        run: mkdir -p client/test-results

      - name: Run client tests
        run: npm run test --prefix client -- --ci --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_FILE: ${{ github.workspace }}/client/test-results/junit.xml

      - name: Publish client test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: client/test-results/junit.xml

  build_client:
    name: Build Client
    needs: [test_client]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install client dependencies
        run: npm ci --prefix client

      - name: Build client
        run: npm run build --prefix client

  docker_client:
    name: Docker Client
    needs: [build_client]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build client Docker image
        run: docker build -t rsgsystem-client:ci ./client

  trivy_client:
    name: Trivy Client Scan
    needs: [docker_client]
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy scan for client (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: client
          format: sarif
          output: trivy-client.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true

      - name: Upload Trivy SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-client.sarif

      - name: Run Trivy scan for client (table report)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: client
          format: table
          output: trivy-client.txt
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true

      - name: Run Trivy scan for client (JUnit report)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: client
          format: template
          template: "@/contrib/junit.tpl"
          output: trivy-client-junit.xml
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true

      - name: Publish Trivy client results as test cases
        if: always() && hashFiles('trivy-client-junit.xml') != ''
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: trivy-client-junit.xml

      - name: Upload Trivy client artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-client-results
          path: |
            trivy-client.sarif
            trivy-client.txt
            trivy-client-junit.xml
