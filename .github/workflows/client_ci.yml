name: Client CI

on:
  push:
    paths:
      - "client/**"
      - ".github/workflows/client_ci.yml"
      - "package.json"
      - "package-lock.json"
  pull_request:
    paths:
      - "client/**"
      - ".github/workflows/client_ci.yml"
      - "package.json"
      - "package-lock.json"

jobs:
  lint_client:
    name: Lint Client
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install client dependencies
        run: npm ci --prefix client

      - name: Run client lint
        run: npm run lint --prefix client

  test_client:
    name: Test Client
    needs: [lint_client]
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install client dependencies
        run: npm ci --prefix client

      - name: Install JUnit reporter
        run: npm install --no-save --prefix client jest-junit

      - name: Ensure client test-results directory exists
        run: mkdir -p client/test-results

      - name: Run client tests
        run: npm run test --prefix client -- --ci --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_FILE: ${{ github.workspace }}/client/test-results/junit.xml

      - name: Publish client test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: client/test-results/junit.xml

  build_client:
    name: Build Client
    needs: [test_client]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install client dependencies
        run: npm ci --prefix client

      - name: Build client
        run: npm run build --prefix client

  docker_client:
    name: Docker Client
    needs: [build_client]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build client Docker image
        run: docker build -t rsgsystem-client:ci ./client
