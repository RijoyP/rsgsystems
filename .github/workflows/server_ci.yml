name: Server CI

on:
  push:
    paths:
      - "server/**"
      - ".github/workflows/server_ci.yml"
      - "package.json"
      - "package-lock.json"
  pull_request:
    paths:
      - "server/**"
      - ".github/workflows/server_ci.yml"
      - "package.json"
      - "package-lock.json"

jobs:
  lint_server:
    name: Lint Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install server dependencies
        run: npm ci --prefix server

      - name: Run server lint
        run: npm run lint --prefix server

  test_server:
    name: Test Server
    needs: [lint_server]
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install server dependencies
        run: npm ci --prefix server

      - name: Install JUnit reporter
        run: npm install --no-save --prefix server jest-junit

      - name: Ensure server test-results directory exists
        run: mkdir -p server/test-results

      - name: Run server tests
        run: npm run test --prefix server -- --ci --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_FILE: ${{ github.workspace }}/server/test-results/junit.xml

      - name: Publish server test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: server/test-results/junit.xml

  build_server:
    name: Build Server
    needs: [test_server]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install server dependencies
        run: npm ci --prefix server

      - name: Build server
        run: npm run build --prefix server

  docker_server:
    name: Docker Server
    needs: [build_server]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server Docker image
        run: docker build -t rsgsystem-server:ci ./server
