name: Server CI

on:
  push:
    paths:
      - "server/**"
      - ".github/workflows/server_ci.yml"
      - "package.json"
      - "package-lock.json"
  pull_request:
    paths:
      - "server/**"
      - ".github/workflows/server_ci.yml"
      - "package.json"
      - "package-lock.json"

jobs:
  lint_server:
    name: Lint Server
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install server dependencies
        run: npm ci --prefix server

      - name: Install ESLint JUnit formatter
        run: npm install --no-save --prefix server eslint-formatter-junit

      - name: Ensure server lint-results directory exists
        run: mkdir -p server/lint-results

      - name: Run server lint and capture report
        id: server_lint
        continue-on-error: true
        run: |
          set +e
          npm run lint --prefix server -- --format junit --output-file server/lint-results/junit.xml > server/lint-results/lint.log 2>&1
          status=$?
          cat server/lint-results/lint.log
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish server lint results
        if: always() && hashFiles('server/lint-results/junit.xml') != ''
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: server/lint-results/junit.xml

      - name: Upload server lint artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-lint-results
          path: |
            server/lint-results/junit.xml
            server/lint-results/lint.log

      - name: Fail on server lint issues
        if: steps.server_lint.outputs.exit_code != '0'
        run: exit 1

  test_server:
    name: Test Server
    needs: [lint_server]
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install server dependencies
        run: npm ci --prefix server

      - name: Install JUnit reporter
        run: npm install --no-save --prefix server jest-junit

      - name: Ensure server test-results directory exists
        run: mkdir -p server/test-results

      - name: Run server tests
        run: npm run test --prefix server -- --ci --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_FILE: ${{ github.workspace }}/server/test-results/junit.xml

      - name: Publish server test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: server/test-results/junit.xml

  build_server:
    name: Build Server
    needs: [test_server]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install server dependencies
        run: npm ci --prefix server

      - name: Build server
        run: npm run build --prefix server

  docker_server:
    name: Docker Server
    needs: [build_server]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server Docker image
        run: docker build -t rsgsystem-server:ci ./server

  trivy_server:
    name: Trivy Server Scan
    needs: [docker_server]
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy scan for server (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: server
          format: sarif
          output: trivy-server.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true

      - name: Upload Trivy SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-server.sarif

      - name: Run Trivy scan for server (table report)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: server
          format: table
          output: trivy-server.txt
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true

      - name: Run Trivy scan for server (JUnit report)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: server
          format: template
          template: "@/contrib/junit.tpl"
          output: trivy-server-junit.xml
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true

      - name: Publish Trivy server results as test cases
        if: always() && hashFiles('trivy-server-junit.xml') != ''
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: trivy-server-junit.xml

      - name: Upload Trivy server artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-server-results
          path: |
            trivy-server.sarif
            trivy-server.txt
            trivy-server-junit.xml
