receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  zipkin/jaeger:
    endpoint: http://jaeger:9412/api/v2/spans
  zipkin:
    endpoint: http://zipkin:9411/api/v2/spans
  prometheus:
    endpoint: 0.0.0.0:8889

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [zipkin/jaeger, zipkin]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
