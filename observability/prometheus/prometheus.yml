global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: rsgsystem-server
    metrics_path: /metrics
    static_configs:
      - targets:
          - server:4000

  - job_name: otel-collector
    static_configs:
      - targets:
          - otel-collector:8889
